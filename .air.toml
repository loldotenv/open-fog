root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/open-fog ."
  bin = "./tmp/open-fog"
  args_bin = ["-addr", ":8081"]
  include_ext = ["go", "html"]
  include_dir = ["", "internal", "static"]
  exclude_dir = ["tmp", "HO1212"]
  exclude_regex = ["_test\\.go$"]
  delay = 300
  stop_on_error = true
  send_interrupt = true
  kill_delay = "1s"

[log]
  time = true

[misc]
  clean_on_exit = true
